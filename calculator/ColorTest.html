<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            background-color: rgb(240, 240, 240);
            text-align: center;
            font-family: "Noto Sans KR", sans-serif, "Malgun Gothic",
                         "굴림", "Gulim", "Arial";
        }
    
        main {
            padding-top: 30px;
        }
    
        .image-container {
            width: 420px;
            height: 420px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
    
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
    
        .nav-btn {
            width: 50px;
            height: 50px;
            font-size: 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
    
        .nav-btn:hover {
            background: #e8e8e8;
        }
    
        .answer {
            margin-top: 10px;
            color: #666;
            font-size: 28px;

            opacity: 0;
            transition: opacity 0.2s;
        }
      
        .answer:hover {
            opacity: 1;
        }
    </style>
  </head>
  
  <body>
    <main>
    
        <div class="image-container">
            <img id="testImage" src="" alt="색각 테스트">
        </div>
    
        <div class="controls">
            <button class="nav-btn" id="prevBtn">&lt;</button>
            <button class="nav-btn" id="nextBtn">&gt;</button>
        </div>
    
        <div class="answer" id="answer"></div>
    
    </main>
    
    <script>
        const imageIds = [13, 4, 8, 77, 84];

        const imagePath = "../images/colortest_";
        const imageExtension = ".jpg";
        
        let currentIndex = 0;
    
        const imageElement = document.getElementById("testImage");
        const answerElement = document.getElementById("answer");
    
        function updateImage() {
            imageElement.src =
                imagePath +
                imageIds[currentIndex] +
                imageExtension;
        
            answerElement.textContent = imageIds[currentIndex];
        }
    
        document.getElementById("prevBtn").onclick = () => {
            currentIndex--;
    
            if (currentIndex < 0) {
                currentIndex = imageIds.length - 1;
            }
    
            updateImage();
        };
    
        document.getElementById("nextBtn").onclick = () => {
            currentIndex++;
    
            if (currentIndex >= imageIds.length) {
                currentIndex = 0;
            }
    
            updateImage();
        };
    
        updateImage();
    </script>
  
  </body>
</html>
